<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema ARES — Detección CCTV</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --accent: #ff0055;
            --bg: #0a0b10;
            --card: rgba(255, 255, 255, 0.05);
            --glass: rgba(15, 15, 25, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, var(--bg) 80%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0,255,136,0.3);
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            flex: 1;
        }

        /* --- Drag & Drop --- */
        .dropzone {
            background: var(--glass);
            border: 2px dashed var(--primary);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dropzone:hover, .dropzone.active {
            background: rgba(0, 255, 136, 0.05);
            transform: scale(1.02);
            border-color: white;
            box-shadow: 0 15px 40px rgba(0,255,136,0.2);
        }

        .dropzone svg { width: 64px; height: 64px; fill: var(--primary); margin-bottom: 1rem; transition: transform 0.3s ease;}
        .dropzone:hover svg { transform: translateY(-10px); }

        /* --- Grid --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .result-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
            backdrop-filter: blur(10px);
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } }

        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-info { padding: 1rem; }
        .card-info h3 { font-size: 0.9rem; color: #aaa; margin-bottom: 0.5rem; word-break: break-all; }
        .detection-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .tag {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            background: rgba(0,255,136,0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            font-weight: 600;
        }
        .tag.peligro {
            background: rgba(255,0,85,0.1);
            color: var(--accent);
            border-color: var(--accent);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,0,85, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255,0,85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,85, 0); }
        }

        /* --- Loading --- */
        #loader {
            display: none;
            text-align: center;
            margin: 2rem;
            font-family: 'Orbitron';
            color: var(--primary);
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink { from { opacity: 0.5; } to { opacity: 1; } }

        button#uploadBtn {
            background: linear-gradient(45deg, var(--primary), #00cc6a);
            color: black;
            border: none;
            padding: 1rem 3rem;
            font-family: 'Orbitron';
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,255,136,0.3);
        }

        button#uploadBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.5);
        }

        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.5);
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>SISTEMA ARES</h1>
        <p>Oráculo de Seguridad y Detección por IA CCTV</p>
    </header>

    <div class="container">
        <div class="dropzone" id="dropzone">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04c-.73-3.23-3.58-5.79-6.96-5.79-2.5 0-4.73 1.34-5.94 3.4C3.83 8.35 2 10.96 2 14c0 3.31 2.69 6 6 6h11c2.21 0 4-1.79 4-4 0-2.02-1.5-3.67-3.5-3.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
            <p id="dropText">Arrastra imágenes aquí o haz clic para seleccionar</p>
            <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
            <br>
            <button id="uploadBtn">ANALIZAR IMÁGENES</button>
        </div>

        <div id="loader">PROCESANDO CON INTELIGENCIA ARTIFICIAL...</div>

        <div class="results-grid" id="resultsGrid">
            <!-- Los resultados aparecerán aquí -->
        </div>
    </div>

    <footer>
        &copy; 2026 Proyecto ARES — Desarrollado con YOLOv8, Python y Node.js
    </footer>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        const resultsGrid = document.getElementById('resultsGrid');
        const dropText = document.getElementById('dropText');

        let selectedFiles = [];

        dropzone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            // Acumular imágenes en vez de sobrescribir
            selectedFiles = [...selectedFiles, ...Array.from(e.target.files)];
            if(selectedFiles.length > 0) {
                dropText.innerHTML = `<strong>${selectedFiles.length} imágenes seleccionadas listas para análisis.</strong>`;
            }
        });

        uploadBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (selectedFiles.length === 0) return alert("Por favor, selecciona al menos una imagen.");

            resultsGrid.innerHTML = '';
            loader.style.display = 'block';

            const formData = new FormData();
            selectedFiles.forEach(file => formData.append('archivos', file)); // Coincide con backend 'archivos'
            
            // Opcional: limpiar la selección después de analizar
            selectedFiles = [];
            dropText.innerHTML = `Arrastra imágenes aquí o haz clic para seleccionar`;

            try {
                // Genera dinámicamente la URL para que funcione desde otros dispositivos por IP local
                const baseUrl = `http://${window.location.hostname}:3000`;
                const peticion = await fetch(`${baseUrl}/predecir`, {
                    method: 'POST',
                    body: formData
                });

                if(!peticion.ok) throw new Error("Error en el servidor o límite de peticiones superado.");

                const resultados = await peticion.json();
                loader.style.display = 'none';

                resultados.forEach(res => {
                    const card = createCard(res);
                    resultsGrid.appendChild(card);
                });

            } catch (err) {
                alert("Error al procesar: " + err.message);
                loader.style.display = 'none';
            }
        });

        function createCard(data) {
            const card = document.createElement('div');
            card.className = 'result-card';

            card.innerHTML = `
                <div class="image-container">
                    <img src="data:image/jpeg;base64,${data.imagen_base64}" alt="${data.nombre_archivo}">
                </div>
                <div class="card-info">
                    <h3>${data.nombre_archivo}</h3>
                    <div class="detection-tags">
                        ${data.detecciones.length === 0 ? '<span class="tag" style="border-color:#555; color:#555">Sin detección</span>' : ''}
                        ${data.detecciones.map(d => `
                            <!-- Si encuentra 'Rifle' o 'arma', lo marca con clase peligro -->
                            <span class="tag ${d.etiqueta.toLowerCase().includes('rifle') || d.etiqueta.toLowerCase().includes('arma') ? 'peligro' : ''}">
                                ${d.etiqueta.toUpperCase()} (${(d.confianza * 100).toFixed(0)}%)
                            </span>
                        `).join('')}
                    </div>
                </div>
            `;
            return card;
        }

        // Efectos Drag & Drop
        ['dragenter', 'dragover'].forEach(name => {
            dropzone.addEventListener(name, (e) => {
                e.preventDefault();
                dropzone.classList.add('active');
            });
        });

        ['dragleave', 'drop'].forEach(name => {
            dropzone.addEventListener(name, (e) => {
                e.preventDefault();
                dropzone.classList.remove('active');
                if(name === 'drop') {
                    // Acumular imágenes en vez de sobrescribir
                    selectedFiles = [...selectedFiles, ...Array.from(e.dataTransfer.files)];
                    dropText.innerHTML = `<strong>${selectedFiles.length} imágenes seleccionadas listas para análisis.</strong>`;
                }
            });
        });
    </script>
</body>
</html>
