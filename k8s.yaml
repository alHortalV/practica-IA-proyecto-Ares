---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-ia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicio-ia
  template:
    metadata:
      labels:
        app: servicio-ia
    spec:
      containers:
      - name: servicio-ia
        image: servicio-ia:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: servicio-ia
spec:
  type: ClusterIP
  selector:
    app: servicio-ia
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-servicio-ia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: servicio-ia
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-intermediario
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicio-intermediario
  template:
    metadata:
      labels:
        app: servicio-intermediario
    spec:
      containers:
      - name: servicio-intermediario
        image: servicio-intermediario:latest
        imagePullPolicy: Never
        env:
        - name: URL_SERVICIO_IA
          value: "http://servicio-ia:8000"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: servicio-intermediario
spec:
  type: LoadBalancer
  selector:
    app: servicio-intermediario
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
